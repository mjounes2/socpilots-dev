version: '3.9'

# ═══════════════════════════════════════════════════════════
#  SOCPilots — Webapp + DB Stack
#  Webapp + Nginx + PostgreSQL (for investigations + settings)
#  n8n is on its own (vmi3254460:5678)
# ═══════════════════════════════════════════════════════════

networks:
  soc:
    driver: bridge

volumes:
  postgres_data:
    driver: local

services:

  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: socpilots-db
    restart: unless-stopped
    networks:
      - soc
    environment:
      POSTGRES_DB:       ${PG_DATABASE:-socpilots}
      POSTGRES_USER:     ${PG_USER:-socpilots}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-socpilots_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-socpilots}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Webapp ────────────────────────────────────────────
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: socpilots
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - soc
    volumes:
      - ./.env:/app/.env:ro     # Live mount → docker compose restart picks up changes
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s

  # ── Nginx ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: socpilots-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - soc
    depends_on:
      webapp:
        condition: service_started
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SOC Pilots — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@500;700&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#04070f;--card:#0d1424;--b1:#162030;--b2:#1e2e45;--c:#00e5ff;--g:#00ff88;--r:#ff2255;--txt:#d8eaf8;--txt2:#6a8aaa;--txt3:#2a4060;--mono:'Share Tech Mono',monospace;--head:'Barlow Condensed',sans-serif;--sans:'Barlow',sans-serif}
body{background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:var(--sans);overflow:hidden;position:relative}
.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.025) 1px,transparent 1px);background-size:40px 40px;animation:gm 25s linear infinite;pointer-events:none}
@keyframes gm{from{background-position:0 0}to{background-position:40px 40px}}
.strip{position:fixed;left:0;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,transparent,var(--c),transparent);animation:sp 3s ease-in-out infinite}
.strip.r{left:auto;right:0;animation-delay:1.5s}
@keyframes sp{0%,100%{opacity:.2}50%{opacity:1;box-shadow:0 0 8px var(--c)}}
.card{position:relative;width:420px;background:var(--card);border:1px solid var(--b2);border-radius:4px;padding:44px 36px 36px;box-shadow:0 0 40px rgba(0,229,255,.06),0 40px 80px rgba(0,0,0,.5)}
.corner{position:absolute;width:14px;height:14px;border-color:var(--c);border-style:solid}
.corner.tl{top:-1px;left:-1px;border-width:2px 0 0 2px}
.corner.tr{top:-1px;right:-1px;border-width:2px 2px 0 0}
.corner.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
.corner.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.3);border-radius:4px;margin-bottom:12px;position:relative}
.logo-pulse{position:absolute;inset:-4px;border:1px solid rgba(0,229,255,.15);border-radius:6px;animation:lp 2s ease-in-out infinite}
@keyframes lp{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
.logo-title{font-family:var(--head);font-size:22px;font-weight:700;letter-spacing:5px;color:var(--txt)}
.logo-title span{color:var(--c)}
.logo-sub{font-size:10px;color:var(--txt3);letter-spacing:2px;font-family:var(--mono);margin-top:3px}
.divider{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.divider-line{flex:1;height:1px;background:var(--b1)}
.divider-txt{font-size:9px;color:var(--txt3);letter-spacing:2px;font-family:var(--mono)}
.err{display:none;align-items:center;gap:7px;background:rgba(255,34,85,.1);border:1px solid rgba(255,34,85,.25);border-radius:3px;padding:9px 12px;font-size:11px;color:var(--r);margin-bottom:14px;font-family:var(--mono);animation:shake .35s ease}
.err.show{display:flex}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}60%{transform:translateX(5px)}}
.fg{margin-bottom:16px}
.fl{display:block;font-size:9px;color:var(--txt2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;font-family:var(--mono)}
.iw{position:relative;display:flex;align-items:center}
.ii{position:absolute;left:12px;color:var(--txt3);pointer-events:none;transition:color .2s;display:flex}
.fi{width:100%;background:rgba(0,0,0,.4);border:1px solid var(--b2);border-radius:3px;padding:11px 12px 11px 38px;color:var(--txt);font-family:var(--mono);font-size:12px;outline:none;transition:all .2s}
.fi:focus{border-color:var(--c);background:rgba(0,229,255,.03)}
.iw:focus-within .ii{color:var(--c)}
.eye{position:absolute;right:10px;background:none;border:none;color:var(--txt3);cursor:pointer;padding:3px;transition:color .2s}
.eye:hover{color:var(--c)}
.btn{width:100%;padding:13px;background:rgba(0,229,255,.1);border:1px solid var(--c);border-radius:3px;color:var(--c);font-family:var(--head);font-size:15px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;margin-top:6px}
.btn:hover{background:rgba(0,229,255,.18);box-shadow:0 0 16px rgba(0,229,255,.2)}
.btn.loading{pointer-events:none;opacity:.7}
.btn .bt{transition:opacity .2s}.btn.loading .bt{opacity:0}
.btn .bs{display:none;position:absolute;inset:0;align-items:center;justify-content:center}
.btn.loading .bs{display:flex}
.sp{width:16px;height:16px;border:2px solid rgba(0,229,255,.3);border-top-color:var(--c);border-radius:50%;animation:spin .5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.foot{margin-top:20px;text-align:center;font-size:9px;color:var(--txt3);font-family:var(--mono);letter-spacing:1px}
.sec{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:8px;padding:5px;border:1px solid var(--b1);border-radius:3px;font-size:8px}
</style>
</head>
<body>
<div class="grid"></div>
<div class="strip"></div><div class="strip r"></div>
<div class="card">
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div class="logo">
    <div class="logo-icon">
      <div class="logo-pulse"></div>
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="1.5">
        <path d="M12 2L20 7V17L12 22L4 17V7Z"/><circle cx="12" cy="12" r="3.5" fill="#00e5ff" opacity=".9"/>
      </svg>
    </div>
    <div class="logo-title">SOC<span>PILOTS</span></div>
    <div class="logo-sub">AI Security Operations Center</div>
  </div>
  <div class="divider"><div class="divider-line"></div><div class="divider-txt">AUTHENTICATE</div><div class="divider-line"></div></div>
  <div class="err" id="err">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="err-txt">Invalid credentials</span>
  </div>
  <div class="fg">
    <label class="fl">Username</label>
    <div class="iw">
      <div class="ii"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      <input type="text" class="fi" id="un" placeholder="Enter username" autocomplete="username">
    </div>
  </div>
  <div class="fg">
    <label class="fl">Password</label>
    <div class="iw">
      <div class="ii"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>
      <input type="password" class="fi" id="pw" placeholder="Enter password" autocomplete="current-password">
      <button class="eye" type="button" onclick="togglePw()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>
  <button class="btn" id="btn" onclick="login()">
    <span class="bt">ACCESS SYSTEM</span>
    <span class="bs"><div class="sp"></div></span>
  </button>
  <div class="foot">AUTHORIZED PERSONNEL ONLY
    <div class="sec">
      <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      TLS ENCRYPTED SESSION
    </div>
  </div>
</div>
<script>
function togglePw(){const i=document.getElementById('pw');i.type=i.type==='password'?'text':'password';}
async function login(){
  const un=document.getElementById('un').value.trim();
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err');
  const btn=document.getElementById('btn');
  err.classList.remove('show');
  if(!un||!pw){document.getElementById('err-txt').textContent='Username and password required';err.classList.add('show');return;}
  btn.classList.add('loading');
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:un,password:pw})});
    const d=await r.json();
    if(r.ok&&d.token){
      sessionStorage.setItem('soc_token',d.token);
      sessionStorage.setItem('soc_user',JSON.stringify({username:d.username,role:d.role}));
      location.replace('/');
    } else {
      document.getElementById('err-txt').textContent=d.error||'Authentication failed';
      err.classList.add('show');btn.classList.remove('loading');
    }
  }catch(e){
    document.getElementById('err-txt').textContent='Server unreachable';
    err.classList.add('show');btn.classList.remove('loading');
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')login();});
</script>
</body>
</html>

<style>
/* ── SPLASH SCREEN ── */
#splash {
  position: fixed; inset: 0; z-index: 99999;
  background: #0a1628;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0;
  transition: opacity .5s ease;
  font-family: 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif;
}
#splash.sp-fade { opacity: 0; pointer-events: none; }
.sp-logo-wrap {
  position: relative;
  width: 88px; height: 88px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
}
.sp-logo-ring {
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 1.5px solid rgba(0,229,255,.18);
  animation: sp-ring-pulse 2.4s ease-in-out infinite;
}
.sp-logo-ring:nth-child(2) { inset: -10px; border-color: rgba(0,229,255,.09); animation-delay: .4s; }
.sp-logo-ring:nth-child(3) { inset: -22px; border-color: rgba(0,229,255,.04); animation-delay: .8s; }
@keyframes sp-ring-pulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.08); opacity: .6; }
}
.sp-logo-hex {
  filter: drop-shadow(0 0 14px rgba(0,229,255,.55));
  animation: sp-hex-glow 2.4s ease-in-out infinite;
}
@keyframes sp-hex-glow {
  0%,100% { filter: drop-shadow(0 0 14px rgba(0,229,255,.55)); }
  50%      { filter: drop-shadow(0 0 28px rgba(0,229,255,.9)); }
}
.sp-name {
  font-size: 28px; font-weight: 700; letter-spacing: .18em;
  color: #e8f4fd; margin-bottom: 6px;
  font-family: 'IBM Plex Sans', system-ui, sans-serif;
}
.sp-name span { color: #00e5ff; }
.sp-tagline {
  font-size: 11px; letter-spacing: .22em; color: #4a6f8a;
  font-family: 'IBM Plex Mono', monospace;
  margin-bottom: 52px;
  text-transform: uppercase;
}
.sp-bar-outer {
  width: 280px; height: 3px;
  background: rgba(255,255,255,.07);
  border-radius: 99px; overflow: hidden;
  margin-bottom: 16px;
  position: relative;
}
.sp-bar-fill {
  height: 100%; width: 0%; border-radius: 99px;
  background: linear-gradient(90deg, #00b8d4, #00e5ff);
  box-shadow: 0 0 12px rgba(0,229,255,.7);
  transition: width .35s cubic-bezier(.4,0,.2,1);
}
.sp-bar-shimmer {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.25) 50%, transparent 100%);
  background-size: 200% 100%;
  animation: sp-shimmer 1.6s linear infinite;
}
@keyframes sp-shimmer {
  0%  { background-position: -200% 0; }
  100%{ background-position:  200% 0; }
}
.sp-pct-row {
  width: 280px; display: flex; justify-content: space-between;
  align-items: baseline;
}
.sp-pct {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px; font-weight: 500;
  color: #00e5ff;
  min-width: 38px;
}
.sp-status {
  font-size: 11px; letter-spacing: .06em;
  color: #4a6f8a; text-align: right;
  font-family: 'IBM Plex Mono', monospace;
  transition: opacity .3s;
}
</style>
</head>
<body>
<!-- Splash screen — visible instantly, no JS required for initial display -->
<div id="splash">
  <div class="sp-logo-wrap">
    <div class="sp-logo-ring"></div>
    <div class="sp-logo-ring"></div>
    <div class="sp-logo-ring"></div>
    <svg class="sp-logo-hex" width="56" height="56" viewBox="0 0 24 24" fill="none"
         stroke="#00e5ff" stroke-width="1.4" stroke-linejoin="round">
      <path d="M12 2L20 7V17L12 22L4 17V7Z"/>
      <circle cx="12" cy="12" r="2.8" fill="#00e5ff" fill-opacity=".9"/>
    </svg>
  </div>
  <div class="sp-name">SOC<span>PILOTS</span></div>
  <div class="sp-tagline">Security Operations Command Center</div>
  <div class="sp-bar-outer">
    <div class="sp-bar-fill" id="sp-bar"></div>
    <div class="sp-bar-shimmer"></div>
  </div>
  <div class="sp-pct-row">
    <div class="sp-pct" id="sp-pct">0%</div>
    <div class="sp-status" id="sp-status">Initializing…</div>
  </div>
</div>

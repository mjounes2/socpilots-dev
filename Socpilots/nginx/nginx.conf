worker_processes auto;
events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  server_tokens off;
  sendfile on;
  gzip on;
  gzip_types text/plain text/css application/javascript application/json;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=api:10m   rate=60r/m;
  limit_req_zone $binary_remote_addr zone=ai:10m    rate=8r/m;

  # Logging
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log;

  # Use Docker's internal DNS so nginx re-resolves after container restarts
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Upstream with retry logic
  upstream webapp {
    server webapp:3000;
    keepalive 16;
  }

  server {
    listen 80 default_server;
    server_name _;

    # Health check (no rate limit, no timeout issue)
    location = /health {
      proxy_pass         http://webapp/health;
      access_log         off;
      proxy_read_timeout 10s;
    }

    # Login (strict rate limit)
    location = /api/login {
      limit_req zone=login burst=5 nodelay;
      proxy_pass         http://webapp;
      proxy_http_version 1.1;
      proxy_set_header   Host            $host;
      proxy_set_header   X-Real-IP       $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
    }

    # AI endpoints — long timeout (LangChain investigation = 180s, n8n = 180s)
    location ~ ^/api/(ai|langchain)/ {
      limit_req zone=ai burst=4 nodelay;
      proxy_pass         http://webapp;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   Connection        "";
      proxy_read_timeout 200s;
      proxy_send_timeout 200s;
      proxy_connect_timeout 10s;
      # Disable buffering for streaming AI responses
      proxy_buffering    off;
      proxy_cache        off;
    }

    # Asset scan endpoints (scanning can take up to 5 min)
    location ~ ^/api/assets/scan {
      limit_req zone=api burst=5 nodelay;
      proxy_pass         http://webapp;
      proxy_http_version 1.1;
      proxy_set_header   Host            $host;
      proxy_set_header   X-Real-IP       $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   Connection      "";
      proxy_read_timeout 30s;   # scan is async — just returns job ID immediately
    }

    # Standard API (rate limited)
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://webapp;
      proxy_http_version 1.1;
      proxy_set_header   Host            $host;
      proxy_set_header   X-Real-IP       $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   Connection      "";
      proxy_read_timeout 90s;
    }

    # All other routes → SPA (static files, Vue router)
    location / {
      proxy_pass         http://webapp;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 90s;
    }
  }
}

# ═══════════════════════════════════════════════════════════════════
#  SOCPilots — Unified Stack
#  All services on one server, one network, no port conflicts
#
#  External ports:
#    80    → Nginx → SOCPilots webapp
#    5678  → n8n automation
#    8080  → TheHive MCP (direct access for n8n)
#
#  Internal only (no host binding):
#    webapp:3000   — behind nginx
#    mcp-wazuh:3001 — accessed by n8n via service name
#    postgres:5432  — accessed by webapp only
#
#  Usage:
#    cp .env.example .env && nano .env
#    docker compose up -d --build
# ═══════════════════════════════════════════════════════════════════

networks:
  soc:
    driver: bridge

volumes:
  postgres_data:
  n8n_data:

services:

  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: socpilots-db
    restart: unless-stopped
    networks:
      - soc
    environment:
      POSTGRES_DB:       ${PG_DATABASE:-socpilots}
      POSTGRES_USER:     ${PG_USER:-socpilots}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-socpilots}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── SOCPilots Webapp ───────────────────────────────────────────
  webapp:
    build:
      context: ./Socpilots-webapp
      dockerfile: Dockerfile
    container_name: socpilots
    restart: unless-stopped
    networks:
      - soc
    # No host port — nginx handles all external traffic on port 80
    volumes:
      - ./Socpilots-webapp/.env:/app/.env:ro
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s

  # ── Nginx Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: socpilots-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Socpilots-webapp/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - soc
    depends_on:
      webapp:
        condition: service_started
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Wazuh MCP Server ───────────────────────────────────────────
  # Accessed internally by n8n via http://mcp-wazuh:3001
  # Connects to Wazuh Manager on the host via host.docker.internal
  mcp-wazuh:
    build:
      context: ./MCP-WAZUH
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.13"
        VERSION: "4.2.1"
        BUILD_DATE: ${BUILD_DATE:-unknown}
      target: production
    image: mcp-wazuh:4.2.1
    container_name: mcp-wazuh
    restart: unless-stopped
    networks:
      - soc
    # No host port — n8n reaches it via internal network: http://mcp-wazuh:3001
    env_file:
      - ./MCP-WAZUH/.env
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 3001
      ENVIRONMENT: production
      AUTH_MODE: ${WAZUH_MCP_AUTH_MODE:-bearer}
      # Wazuh Manager and Indexer run on a separate server — set WAZUH_HOST in .env
      WAZUH_HOST: ${WAZUH_HOST:-vmi3247591.contaboserver.net}
      WAZUH_PORT: ${WAZUH_PORT:-55000}
      WAZUH_VERIFY_SSL: "false"
      WAZUH_INDEXER_HOST: ${WAZUH_INDEXER_HOST:-vmi3247591.contaboserver.net}
      WAZUH_INDEXER_PORT: ${WAZUH_INDEXER_PORT:-9200}
      WAZUH_INDEXER_VERIFY_SSL: "false"
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
      - /app/logs:noexec,nosuid,size=128m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --max-time 5 http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ── TheHive MCP Server ─────────────────────────────────────────
  # Accessed internally by n8n via http://thehive-mcp:8080
  thehive-mcp:
    build:
      context: ./thehive-mcp-new/thehive-mcp-new
      dockerfile: Dockerfile
    image: thehive-mcp:latest
    container_name: thehive-mcp
    restart: unless-stopped
    networks:
      - soc
    ports:
      - "8080:8080"   # also exposed externally so n8n can reach it directly if needed
    environment:
      THEHIVE_URL: ${THEHIVE_URL}
      THEHIVE_API_KEY: ${THEHIVE_API_KEY}
      PORT: 8080
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── n8n Automation ─────────────────────────────────────────────
  # AI agent that connects SOCPilots → MCP-Wazuh → TheHive
  n8n:
    image: n8nio/n8n:latest
    container_name: socpilots-n8n
    restart: always
    networks:
      - soc
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://${SERVER_IP:-localhost}:5678/
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_SECURE_COOKIE=false
      # Internal MCP endpoints — n8n uses these service names directly
      - MCP_WAZUH_URL=http://mcp-wazuh:3001
      - MCP_THEHIVE_URL=http://thehive-mcp:8080
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - mcp-wazuh
      - thehive-mcp

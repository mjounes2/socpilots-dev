# ═══════════════════════════════════════════════════════════════════
#  SOCPilots — Unified Stack
#  All services on one server, one network, one .env file at root.
#
#  External ports:
#    80    → Nginx → SOCPilots webapp
#    5678  → n8n automation
#    8080  → TheHive MCP (direct access for n8n)
#
#  Internal only (no host binding):
#    webapp:3000    — behind nginx
#    mcp-wazuh:3001 — accessed by n8n via service name
#    postgres:5432  — accessed by webapp only
#
#  Usage:
#    cp .env.example .env && nano .env
#    docker compose up -d --build
# ═══════════════════════════════════════════════════════════════════

networks:
  soc:
    driver: bridge

volumes:
  postgres_data:
  n8n_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  qdrant_data:

services:

  # ── Qdrant Vector Database ─────────────────────────────────────
  # Stores semantic embeddings for MITRE, detection rules, incidents
  # REST API at :6333, gRPC at :6334 (internal only)
  qdrant:
    image: qdrant/qdrant:v1.9.3
    container_name: socpilots-qdrant
    restart: unless-stopped
    networks:
      - soc
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333' 2>/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Redis IOC Cache ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: socpilots-redis
    restart: unless-stopped
    networks:
      - soc
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: socpilots-db
    restart: unless-stopped
    networks:
      - soc
    environment:
      POSTGRES_DB:       ${PG_DATABASE:-socpilots}
      POSTGRES_USER:     ${PG_USER:-socpilots}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-socpilots}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── SOCPilots Webapp ───────────────────────────────────────────
  webapp:
    build:
      context: ./Socpilots
      dockerfile: Dockerfile
    container_name: socpilots
    restart: unless-stopped
    networks:
      - soc
    volumes:
      - ./.env:/app/.env:ro
    # No host port — nginx handles all external traffic on port 80
    environment:
      NODE_ENV: production
      PORT: 3000
      # PostgreSQL
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: ${PG_DATABASE:-socpilots}
      PG_USER: ${PG_USER:-socpilots}
      PG_PASSWORD: ${PG_PASSWORD}
      # OpenSearch / Wazuh Indexer
      OPENSEARCH_URL: ${OPENSEARCH_URL}
      OPENSEARCH_USER: ${OPENSEARCH_USER:-admin}
      OPENSEARCH_PASS: ${OPENSEARCH_PASS}
      WAZUH_INDEX: ${WAZUH_INDEX:-wazuh-alerts-*}
      # TheHive
      THEHIVE_URL: ${THEHIVE_URL}
      THEHIVE_API_KEY: ${THEHIVE_API_KEY}
      # n8n webhooks — use internal Docker service name
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678/webhook/socpilots}
      N8N_INVESTIGATION_URL: ${N8N_INVESTIGATION_URL:-http://n8n:5678/webhook/socpilots-investigation}
      # Auth users
      SOC_USERS: ${SOC_USERS}
      # Neo4j UEBA
      NEO4J_URI:      bolt://neo4j:7687
      NEO4J_USER:     neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      # Network Scanner
      SCANNER_URL:    http://scanner:7777
      # Asset Scan microservice
      ASSET_SCAN_URL: http://asset-scan:5003
      # LangChain Investigation Agent
      LANGCHAIN_URL:  http://langchain-agent:8001
      LANGCHAIN_INTERNAL_TOKEN: ${LANGCHAIN_INTERNAL_TOKEN:-}
      # RAG Vector Search
      RAG_URL:        http://rag-retrieval:5005
      RAG_API_KEY:    ${RAG_API_KEY:-}
      # Dark SOC — Wazuh MCP active response (playbook engine)
      MCP_WAZUH_URL:  http://mcp-wazuh:3001
      MCP_AUTH_SECRET: ${AUTH_SECRET_KEY:-}
      # Threat hunt scheduler
      HUNT_SCHEDULER_ENABLED: ${HUNT_SCHEDULER_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s

  # ── Nginx Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: socpilots-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Socpilots-webapp/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - soc
    depends_on:
      webapp:
        condition: service_started
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Wazuh MCP Server ───────────────────────────────────────────
  # Accessed internally by n8n via http://mcp-wazuh:3001
  # Connects to Wazuh Manager on a separate server (WAZUH_HOST in .env)
  mcp-wazuh:
    build:
      context: ./MCP-WAZUH
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.13"
        VERSION: "4.2.1"
        BUILD_DATE: ${BUILD_DATE:-unknown}
      target: production
    image: mcp-wazuh:4.2.1
    container_name: mcp-wazuh
    restart: unless-stopped
    networks:
      - soc
    # No host port — n8n reaches it via internal network: http://mcp-wazuh:3001
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 3001
      ENVIRONMENT: production
      # Auth
      AUTH_MODE: ${WAZUH_MCP_AUTH_MODE:-bearer}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      MCP_API_KEY: ${MCP_API_KEY:-}
      # Wazuh Manager
      WAZUH_HOST: ${WAZUH_HOST}
      WAZUH_PORT: ${WAZUH_PORT:-55000}
      WAZUH_USER: ${WAZUH_USER}
      WAZUH_PASS: ${WAZUH_PASS}
      WAZUH_VERIFY_SSL: "false"
      # Wazuh Indexer
      WAZUH_INDEXER_HOST: ${WAZUH_INDEXER_HOST}
      WAZUH_INDEXER_PORT: ${WAZUH_INDEXER_PORT:-9200}
      WAZUH_INDEXER_USER: ${WAZUH_INDEXER_USER:-admin}
      WAZUH_INDEXER_PASS: ${WAZUH_INDEXER_PASS}
      WAZUH_INDEXER_VERIFY_SSL: "false"
      LOG_LEVEL: INFO
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
      - /app/logs:noexec,nosuid,size=128m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --max-time 5 http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ── TheHive MCP Server ─────────────────────────────────────────
  # Accessed internally by n8n via http://thehive-mcp:8080
  thehive-mcp:
    build:
      context: ./thehive-mcp-new/thehive-mcp-new
      dockerfile: Dockerfile
    image: thehive-mcp:latest
    container_name: thehive-mcp
    restart: unless-stopped
    networks:
      - soc
    ports:
      - "8080:8080"
    environment:
      THEHIVE_URL: ${THEHIVE_URL}
      THEHIVE_API_KEY: ${THEHIVE_API_KEY}
      PORT: 8080
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Neo4j UEBA Graph Database ──────────────────────────────
  # Community Edition — free forever
  # Browser UI: http://YOUR_SERVER_IP:7474  (login: neo4j / NEO4J_PASSWORD)
  neo4j:
    image: neo4j:5-community
    container_name: socpilots-neo4j
    restart: unless-stopped
    networks:
      - soc
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt (used by webapp)
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Network Asset Scanner ───────────────────────────────────
  # Runs nmap as root in isolated container, called by webapp
  scanner:
    build:
      context: ./scanner
      dockerfile: Dockerfile
    container_name: socpilots-scanner
    restart: unless-stopped
    networks:
      - soc
    cap_add:
      - NET_RAW
      - NET_ADMIN
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7777/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── LangChain Multi-Step Investigation Agent ───────────────
  # ReAct agent: Reason → Act → Observe loop
  # POST /investigate — deep analysis  POST /triage — fast classify
  langchain-agent:
    build:
      context: ./langchain-agent
      dockerfile: Dockerfile
    container_name: socpilots-langchain
    restart: unless-stopped
    networks:
      - soc
    ports:
      - "8001:8001"
    environment:
      OPENAI_API_KEY:   ${OPENAI_API_KEY}
      MISTRAL_API_KEY:  ${MISTRAL_API_KEY:-}
      OPENSEARCH_URL:   ${OPENSEARCH_URL}
      OPENSEARCH_USER:  ${OPENSEARCH_USER:-admin}
      OPENSEARCH_PASS:  ${OPENSEARCH_PASS}
      WAZUH_INDEX:      ${WAZUH_INDEX:-wazuh-alerts-*}
      THEHIVE_URL:      ${THEHIVE_URL}
      THEHIVE_API_KEY:  ${THEHIVE_API_KEY}
      VIRUSTOTAL_API_KEY:  ${VIRUSTOTAL_API_KEY}
      ABUSEIPDB_API_KEY:   ${ABUSEIPDB_API_KEY}
      WEBAPP_URL:          http://webapp:3000
      LANGCHAIN_INTERNAL_TOKEN: ${LANGCHAIN_INTERNAL_TOKEN:-}
      REDIS_URL:           redis://redis:6379
      RAG_URL:             http://rag-retrieval:5005
    depends_on:
      rag-retrieval:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Knowledge Ingestion Service ────────────────────────────────
  # Embeds MITRE ATT&CK + detection rules + TheHive incidents → Qdrant
  # Internal only: POST /ingest  GET /health  GET /stats
  knowledge-ingestion:
    build:
      context: ./services/knowledge-ingestion
      dockerfile: Dockerfile
    container_name: socpilots-knowledge-ingestion
    restart: unless-stopped
    networks:
      - soc
    environment:
      QDRANT_URL:      http://qdrant:6333
      QDRANT_API_KEY:  ${QDRANT_API_KEY:-}
      RAG_API_KEY:     ${RAG_API_KEY:-}
      OPENSEARCH_URL:  ${OPENSEARCH_URL}
      OPENSEARCH_USER: ${OPENSEARCH_USER:-admin}
      OPENSEARCH_PASS: ${OPENSEARCH_PASS}
      THEHIVE_URL:     ${THEHIVE_URL}
      THEHIVE_API_KEY: ${THEHIVE_API_KEY}
      WAZUH_INDEX:     ${WAZUH_INDEX:-wazuh-alerts-*}
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5004/health', timeout=5)"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s

  # ── RAG Retrieval Service ──────────────────────────────────────
  # Semantic search over Qdrant knowledge base (MITRE, rules, incidents)
  # Internal only: POST /retrieve  POST /search/investigation  POST /search/hunting
  rag-retrieval:
    build:
      context: ./services/rag-retrieval
      dockerfile: Dockerfile
    container_name: socpilots-rag-retrieval
    restart: unless-stopped
    networks:
      - soc
    environment:
      QDRANT_URL:     http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      RAG_API_KEY:    ${RAG_API_KEY:-}
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5005/health', timeout=5)"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s

  # ── Asset Scan Microservice ────────────────────────────────────
  # Python/Flask — nmap discovery + Wazuh gap detection + Neo4j
  # Internal only: webapp calls http://asset-scan:5003
  asset-scan:
    build:
      context: ./services/asset-scan
      dockerfile: Dockerfile
    container_name: socpilots-asset-scan
    restart: unless-stopped
    networks:
      - soc
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      PORT: 5003
      # PostgreSQL
      PG_HOST:     postgres
      PG_PORT:     5432
      PG_DB:       ${PG_DATABASE:-socpilots}
      PG_USER:     ${PG_USER:-socpilots}
      PG_PASSWORD: ${PG_PASSWORD}
      # Wazuh Manager REST API
      WAZUH_HOST:  ${WAZUH_HOST}
      WAZUH_PORT:  ${WAZUH_PORT:-55000}
      WAZUH_USER:  ${WAZUH_USER}
      WAZUH_PASS:  ${WAZUH_PASS}
      # OpenSearch fallback for agent list
      OPENSEARCH_URL:  ${OPENSEARCH_URL}
      OPENSEARCH_USER: ${OPENSEARCH_USER:-admin}
      OPENSEARCH_PASS: ${OPENSEARCH_PASS}
      # Neo4j UEBA graph
      NEO4J_URI:      bolt://neo4j:7687
      NEO4J_USER:     neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5003/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── n8n Automation ─────────────────────────────────────────────
  # AI agent that connects SOCPilots → MCP-Wazuh → TheHive
  n8n:
    image: n8nio/n8n:latest
    container_name: socpilots-n8n
    restart: always
    networks:
      - soc
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://${SERVER_IP:-localhost}:5678/
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_SECURE_COOKIE=false
      # MCP service coordinates — consumed by workflow $env expressions
      - MCP_WAZUH_HOST=mcp-wazuh
      - MCP_WAZUH_PORT=3001
      - MCP_THEHIVE_HOST=thehive-mcp
      - MCP_THEHIVE_PORT=8080
      - N8N_INTERNAL_HOST=n8n
      - N8N_INTERNAL_PORT=5678
      # Threat intel API keys — consumed by Enrichment workflow $env expressions
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY}
      - ASSET_SCAN_URL=http://asset-scan:5003
      - THEHIVE_URL=${THEHIVE_URL}
      - THEHIVE_API_KEY=${THEHIVE_API_KEY}
      - N8N_WEBHOOK_BASE=http://n8n:5678
      # Allowlist env vars accessible in workflow expressions
      - N8N_SECURITY_ALLOWED_EXTERNAL_ENV_VARS=MCP_WAZUH_HOST,MCP_WAZUH_PORT,MCP_THEHIVE_HOST,MCP_THEHIVE_PORT,N8N_INTERNAL_HOST,N8N_INTERNAL_PORT,VIRUSTOTAL_API_KEY,ABUSEIPDB_API_KEY,ASSET_SCAN_URL,THEHIVE_URL,THEHIVE_API_KEY,N8N_WEBHOOK_BASE
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - mcp-wazuh
      - thehive-mcp

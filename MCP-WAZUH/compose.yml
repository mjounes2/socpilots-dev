# Wazuh MCP Remote Server - Docker Compose v2 Latest
# MCP-compliant remote server with production-grade configuration
# Branch: main - Production-ready remote MCP server
# Uses Docker Compose v2 latest format with compose.yml naming convention

name: wazuh-main-server

services:
  wazuh-main-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE}
        PYTHON_VERSION: ${PYTHON_VERSION:-3.13}
        VERSION: ${VERSION:-4.2.1}
      target: production

    image: wazuh-main-server:${VERSION:-4.2.1}
    container_name: wazuh-main-server
    hostname: wazuh-main-server
    network_mode: host
    
    restart: unless-stopped
    init: true
    
    env_file:
      - .env
    environment:
      # Runtime overrides
      MCP_HOST: 0.0.0.0
      MCP_PORT: 3000
      ENVIRONMENT: production
      # Authentication mode: oauth (recommended), bearer (default), none (dev only)
      AUTH_MODE: ${AUTH_MODE:-bearer}
      # Wazuh connection settings
      WAZUH_HOST: localhost
      WAZUH_USER: wazuh-wui
      WAZUH_PASS: MyS3cr37P450r.*-
      WAZUH_PORT: 55000
      WAZUH_VERIFY_SSL: "false"
      # Indexer settings
      WAZUH_INDEXER_HOST: localhost
      WAZUH_INDEXER_PORT: 9200
      WAZUH_INDEXER_USER: admin
      WAZUH_INDEXER_PASS: SecretPassword
      WAZUH_INDEXER_VERIFY_SSL: "false"
      
    # Ports are exposed via network_mode: host
    
    # Modern health check with curl
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --max-time 5 http://localhost:3000/health | jq -e '.status == \"healthy\"' > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 45s
      
    # Resource management
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    
    # Writable directories
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
      - /app/logs:noexec,nosuid,size=128m
    
    # Structured logging
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=wazuh-main-server"
    
    # Service labels
    labels:
      - "com.docker.compose.service=wazuh-main-server"
      - "org.opencontainers.image.title=Wazuh MCP Remote Server"
      - "org.opencontainers.image.description=MCP-compliant remote server for Wazuh SIEM (main branch)"
      - "monitoring.prometheus.scrape=true"
      - "monitoring.prometheus.port=3000"
      - "monitoring.prometheus.path=/metrics"
      - "branch=main"